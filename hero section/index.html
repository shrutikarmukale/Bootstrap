<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hero Section</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
}

.hero{
height:100vh;
background:
linear-gradient(rgba(29, 94, 223, 0.35),
rgba(255,170,220,.25)),
url("") center center/cover no-repeat;
}

.navbar{
background:transparent;
}

.nav-link{
color:white!important;
margin:0 12px;
}

.nav-link:hover{
color:#8fd3ff!important;
}

.hero-content{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:rgb(31, 1, 1);
}

.tag{
display:inline-block;
padding:10px 25px;
border-radius:30px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
margin-bottom:20px;
}

.hero h1{
font-size:65px;
font-weight:bold;
}

.hero p{
max-width:650px;
margin:auto;
margin-top:20px;
margin-bottom:35px;
}

.search-box{
background:rgba(255,255,255,.15);
padding:8px;
border-radius:50px;
backdrop-filter:blur(10px);
}

.form-control{
border:none;
background:transparent;
color:white;
}

.form-control::placeholder{
color:white;
}

.form-control:focus{
background:transparent;
box-shadow:none;
color:white;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
<div class="container">

<a class="navbar-brand fw-bold" href="#">Mindloop</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav mx-auto">

<li class="nav-item"><a class="nav-link" href="#">Features</a></li>
<li class="nav-item"><a class="nav-link" href="#">About</a></li>
<li class="nav-item"><a class="nav-link" href="#">News</a></li>
<li class="nav-item"><a class="nav-link" href="#">Docs</a></li>

</ul>

</div>

</div>
</nav>

<section class="hero">

<div class="container hero-content">

<div>

<div class="tag">
7000+ people already subscribed
</div>

<h1>Focus in a <br> Distracted World</h1>

<p>
Tools for deep work and clarity. Stay productive and achieve your goals with a beautiful modern interface.
</p>

<div class="search-box">

<div class="input-group">

<input type="email" class="form-control" placeholder="Enter your email">

<button class="btn btn-light rounded-pill px-4">
Join Waitlist
</button>

</div>

</div>

</div>

</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
